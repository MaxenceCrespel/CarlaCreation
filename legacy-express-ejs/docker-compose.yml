services:
  web:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: carla-creation-website
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file:
      - backend/.env
    environment:
      NODE_ENV: production
    volumes:
      - salon-data:/app/data
      - salon-uploads:/app/uploads
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  salon-data:
  salon-uploads:
