name: E2E Cypress Tests

on:
  workflow_call:

env:
  # Matches the account api/init.sql bootstraps automatically — no need to
  # generate CI-specific credentials, the pre-seeded admin already works.
  ADMIN_USERNAME: carla
  ADMIN_PASSWORD: Carla0303!

jobs:
  Cypress-Tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      # No .env, no migration step needed: docker-compose.yml ships working
      # defaults (JWT_SECRET, COOKIE_SECURE) and api/init.sql bootstraps the
      # schema + the admin account above automatically on first boot.
      - name: Démarrage de l'infrastructure Docker (DB + API + Front)
        run: |
          docker compose up -d --build
          sleep 15

      # init.sql deliberately no longer seeds demo prestations/galerie/avis
      # (real site, not a local dev demo) — but services.cy.js/booking.cy.js
      # need at least a couple of real prestations to pick from, so seed
      # those as CI-only test fixtures.
      - name: Données de test pour Cypress (prestations/galerie)
        run: docker compose exec -T web npm run seed:data

      - name: Exécution des tests Cypress
        uses: cypress-io/github-action@v6
        with:
          working-directory: client
          wait-on: "http://localhost:3000"
          wait-on-timeout: 60
        env:
          CYPRESS_ADMIN_USERNAME: ${{ env.ADMIN_USERNAME }}
          CYPRESS_ADMIN_PASSWORD: ${{ env.ADMIN_PASSWORD }}

      - name: Sauvegarde de la vidéo en cas d'échec
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-video
          path: client/cypress/videos

      - name: Extinction de l'infrastructure
        if: always()
        run: docker compose down -v
