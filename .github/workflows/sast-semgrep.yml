name: SAST Semgrep

on:
  workflow_call:

permissions:
  security-events: write
  contents: read
  actions: read

jobs:
  SAST-Semgrep:
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Run Semgrep SAST
        # continue-on-error: true
        run: |
          semgrep ci \
            --config p/nodejs \
            --config p/javascript \
            --config p/owasp-top-ten \
            --sarif \
            --output semgrep.sarif

      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v4
        # Code scanning (the Security tab SARIF viewer) requires GitHub
        # Advanced Security, not available on private repos on every plan —
        # the actual scan above still runs and blocks on real findings,
        # this step is only a nice-to-have visualization on top of that.
        continue-on-error: true
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep
