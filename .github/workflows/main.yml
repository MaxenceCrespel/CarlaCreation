name: Pipeline CI/CD Collector.shop

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 7 * * *"

permissions:
  security-events: write
  contents: read
  actions: read
  issues: write
  packages: write

jobs:
  Linter-and-Tests:
    uses: ./.github/workflows/linter-tests.yml

  Secret-Scanning:
    uses: ./.github/workflows/secret-scan.yml

  SAST-Semgrep:
    needs: Linter-and-Tests
    uses: ./.github/workflows/sast-semgrep.yml

  SCA-Dependency-Scan:
    needs: Linter-and-Tests
    uses: ./.github/workflows/sca-audit.yml

  IaC-Security-Checkov:
    uses: ./.github/workflows/iac-checkov.yml

  Docker-Build-and-Security:
    needs: Linter-and-Tests
    uses: ./.github/workflows/docker-build.yml

  # TEMPORAIREMENT DÉSACTIVÉS pendant la stabilisation des tests E2E-Cypress,
  # pour des retours plus rapides à chaque push (pas de scan ZAP/charge de
  # plusieurs minutes en plus du reste). Retirer `if: false` une fois
  # E2E-Cypress vert de façon fiable.
  Load-Testing:
    needs: Docker-Build-and-Security
    if: false
    uses: ./.github/workflows/load-testing.yml

  DAST-OWASP-ZAP:
    needs: Docker-Build-and-Security
    if: false
    uses: ./.github/workflows/dast-zap.yml

  E2E-Cypress:
    needs: Docker-Build-and-Security
    uses: ./.github/workflows/e2e-cypress.yml

  # Note : tant que Load-Testing/DAST-OWASP-ZAP sont désactivés ci-dessus,
  # ce job sera aussi automatiquement skippé (un `needs` skippé n'est pas
  # considéré comme réussi) — sans impact réel puisque deploy.yml reste de
  # toute façon un squelette (pas de vraie cible de déploiement branchée).
  Deploy-Production:
    needs: [Load-Testing, DAST-OWASP-ZAP, E2E-Cypress]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    uses: ./.github/workflows/deploy.yml
