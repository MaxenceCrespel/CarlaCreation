name: DAST ZAP

on:
  workflow_call:

jobs:
  DAST-OWASP-ZAP:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
      - name: Génération d'un .env pour Docker Compose
        run: |
          cat > api/.env <<EOF
          JWT_SECRET=ci-dast-zap-jwt-secret-not-used-anywhere-else-1234567890
          COOKIE_SECURE=false
          PUBLIC_ORIGIN=http://localhost:3000
          EOF
      - name: Démarrage de l'infrastructure
        run: |
          docker compose up -d --build
          sleep 15
      - name: Migration de la base de données
        run: docker compose exec -T web npm run migration:run
      - name: Attaque dynamique (OWASP ZAP) via Docker
        # continue-on-error: true
        run: |
          mkdir -p zap-reports
          chmod 777 zap-reports
          docker run --rm --network host \
            -v $(pwd)/zap-reports:/zap/wrk/:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py -t http://localhost:3000 -r zap-report.html -I
      - name: Sauvegarde du rapport ZAP (Upload V4)
        uses: actions/upload-artifact@v4
        with:
          name: zap-scan-report
          path: zap-reports/zap-report.html
