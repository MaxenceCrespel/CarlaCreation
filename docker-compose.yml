services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: salon
      POSTGRES_PASSWORD: salon
      POSTGRES_DB: salon
    volumes:
      - salon-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U salon"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: api/Dockerfile
    image: carla-creation-website
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '3000:3000'
    # Optional: api/.env is gitignored and won't exist on a fresh checkout
    # (CI, or a first `docker compose up` before anyone's created one) —
    # `required: false` means compose just skips it instead of erroring out.
    # JWT_SECRET still has to come from *somewhere* for the app to boot;
    # either put it in api/.env for local/real use, or pass it via
    # `environment:`/`docker compose run -e` (CI does the latter).
    env_file:
      - path: api/.env
        required: false
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://salon:salon@postgres:5432/salon
    volumes:
      - salon-uploads:/app/uploads
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  salon-postgres:
  salon-uploads:
